name: Create resource group

on:
  workflow_call:
    inputs:
      container-app-name:
        description: The name of the container app being released
        required: true
        type: string
    outputs:
      resource-group-name:
        description: The name of the resource group to create
        value: ${{ jobs.variables.outputs.resourceGroupName }}
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  variables:
    name: Generate variables
    runs-on: ubuntu-latest
    steps:
    - name: Display done
      run: echo "Variables loaded..."
    outputs:
      resourceGroupName: rg-test-${{ inputs.container-app-name }}
      
  deploy-resource-group:
    environment: development
    name: Deploy new resource group to azure
    needs: variables
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: deploy
      id: rg-deployment
      uses: azure/arm-deploy@v2
      with:
        scope: subscription
        region: uksouth
        subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        resourceGroupName: sming
        template: ./.github/workflows/bicep/create-resource-group.bicep
        parameters: 'resourceGroupName=${{ needs.variables.outputs.resourceGroupName }} resourceGroupLocation=uksouth'
