  create-release:
    name: Create release
    needs: [ variables, build-docker-images ]
    if: ${{ github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/add-github-release.yaml
    with:
      version-number: ${{ needs.variables.outputs.version-no }}
      previous-tag: ${{ needs.variables.outputs.last-release-tag }}