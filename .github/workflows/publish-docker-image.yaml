name: Publish Docker Image

on:
  workflow_call:
    inputs:
      archive-name:
        description: The name of the artifact to download
        required: true
        type: string
      image-name:
        type: string
        required: true
      version-number:
        type: string
        required: true

jobs:
  deployment:
    name: Push docker image to container registry.
    runs-on: ubuntu-latest
    steps:
    - name: Login to Github Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io/sming-code
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Download Build Artifacts
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.archive-name }}
        path: ${{ runner.temp }}
    - name: Load image
      run: |
        docker load --input ${{ runner.temp }}/docker-image.tar
        docker image ls -a
    - name: Publish to GPR
      run: |
        docker tag ${{ inputs.image-name }}:${{ inputs.version-number }} ghcr.io/sming-code/${{ inputs.image-name }}:latest
        docker tag ${{ inputs.image-name }}:${{ inputs.version-number }} ghcr.io/sming-code/${{ inputs.image-name }}:${{ inputs.version-number }}
        docker push ghcr.io/sming-code/${{ inputs.image-name }}:latest
        docker push ghcr.io/sming-code/${{ inputs.image-name }}:${{ inputs.version-number }}